<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectAssist | Test Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --pass: #10b981;
            --fail: #ef4444;
            --text: #f1f5f9;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .test-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 24px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        h1 { margin-top: 0; font-size: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem; }
        #test-results p { padding: 10px 15px; border-radius: 8px; margin: 8px 0; font-size: 0.9rem; }
        .test-pass { background: rgba(16, 185, 129, 0.15); border: 1px solid var(--pass); color: #6ee7b7; }
        .test-fail { background: rgba(239, 68, 68, 0.15); border: 1px solid var(--fail); color: #fca5a5; }
        .testing { color: #94a3b8; font-style: italic; }
        .test-summary { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .back-link { display: block; text-align: center; margin-top: 1rem; color: #6366f1; text-decoration: none; font-size: 0.8rem; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="test-card">
    <h1>🗳️ ElectAssist Test Runner</h1>
    <div id="test-results">
        <p class="testing">Initializing tests...</p>
    </div>
    <a href="index.html" class="back-link">← Back to Main App</a>
</div>

<!-- Load application data and logic first -->
<script src="data.js"></script>
<!-- Note: We need a slight modification to app.js to prevent it from auto-initializing everything during tests if needed, 
     but for now, we'll just let it load and our tests will run afterward. -->
<script src="app.js"></script>
<!-- Load the test suite -->
<script src="tests.js"></script>

</body>
</html>
